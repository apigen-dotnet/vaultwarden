name: Regenerate

on:
  push:
    branches: [main]
    paths: ['specs/**']
  repository_dispatch:
    types: [generator-release]
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: apigen-dotnet/generator
          path: .generator

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Find config
        id: config
        run: |
          CONFIG=$(ls specs/*.toml | head -1)
          echo "file=$CONFIG" >> "$GITHUB_OUTPUT"

      - name: Regenerate
        run: dotnet run --project .generator/src/Apigen.Generator/Apigen.Generator.csproj -- --config "${{ steps.config.outputs.file }}"

      - name: Cleanup generator
        run: rm -rf .generator

      - name: Check for meaningful changes
        id: diff
        run: |
          MEANINGFUL=$(git diff --unified=0 | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v '// Generated on:' | grep -v '^@@' || true)
          if [ -z "$MEANINGFUL" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            git checkout -- .
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate from latest spec/generator"
          git push
